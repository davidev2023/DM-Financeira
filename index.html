<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#181818">
    <title>DM Financeira</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- BARRA SUPERIOR FIXA (TOP BAR) -->
    <div class="top-bar">
        <span class="top-bar-titulo">DM Financeira V20</span>
        <button id="btnMenuHamburguer" class="btn-hamburguer" onclick="toggleHeader()">☰</button>
    </div>

    <!-- HEADER AMARELO QUE DESCE AO CLICAR NO HAMBÚRGUER -->
    <header id="meuHeader" class="escondido">
        <h1>Opções do Aplicativo</h1>
        <div class="header-botoes">
            <button id="btnInstalar">📲 Instalar Aplicativo</button>
            <button id="btnAtualizar" onclick="verificarAtualizacao()">🔄 Buscar Atualização</button>
        </div>
    </header>

    <main>
        <!-- DASHBOARD -->
        <section id="dashboard" class="tela ativa">
            <div class="dashboard">
                <div class="box"><h3>👥 Clientes</h3><p id="totalClientes">0</p></div>
                <div class="box"><h3>💰 Emprestado</h3><p id="totalEmprestado">R$ 0,00</p></div>
                <div class="box"><h3>✅ Recebido</h3><p id="totalRecebido">R$ 0,00</p></div>
                <div class="box"><h3>⏳ Em Aberto</h3><p id="totalAberto">R$ 0,00</p></div>
            </div>
        </section>

        <!-- LISTA DE CLIENTES -->
        <section id="clientes" class="tela">
            <div class="card">
                <h2>Clientes Cadastrados</h2>
                <div id="listaClientes"></div>
            </div>
        </section>

        <!-- NOVO CLIENTE -->
        <section id="novoCliente" class="tela">
            <div class="card">
                <h2>Novo Empréstimo</h2>

                <!-- FOTO DE PERFIL -->
                <div class="secao-form">
                    <h3>👤 Perfil do Cliente</h3>
                    <label for="fotoCliente">Foto de Perfil:</label>
                    <input type="file" id="fotoCliente" accept="image/*">

                    <input id="nome" type="text" placeholder="Nome completo">
                    <input id="cpf" type="text" inputmode="numeric" placeholder="CPF">
                    <input id="telefone" type="tel" inputmode="tel" placeholder="Telefone principal (com DDD)">
                    <input id="chavePix" type="text" placeholder="Chave PIX do Cliente">
                </div>

                <!-- ENDEREÇO E VEÍCULO -->
                <div class="secao-form">
                    <h3>🚗 Residência & Veículo</h3>
                    <input id="endereco" type="text" placeholder="Endereço Completo">
                    <input id="linkLocalizacao" type="url" placeholder="Link da Localização Fixo (Google Maps)">
                    <input id="placaVeiculo" type="text" placeholder="Placa do Veículo">
                </div>

                <!-- EMPRÉSTIMO -->
                <div class="secao-form">
                    <h3>💰 Dados do Empréstimo</h3>
                    <label for="valor">Valor do Empréstimo:</label>
                    <select id="valor">
                        <option value="300">R$ 300,00 (R$ 17,00/dia)</option>
                        <option value="400">R$ 400,00 (R$ 22,00/dia)</option>
                        <option value="500">R$ 500,00 (R$ 28,00/dia)</option>
                        <option value="600">R$ 600,00 (R$ 33,00/dia)</option>
                        <option value="700">R$ 700,00 (R$ 39,00/dia)</option>
                        <option value="800">R$ 800,00 (R$ 44,00/dia)</option>
                        <option value="900">R$ 900,00 (R$ 50,00/dia)</option>
                        <option value="1000">R$ 1.000,00 (R$ 56,00/dia)</option>
                    </select>

                    <label for="data">Data do Empréstimo:</label>
                    <input id="data" type="date">
                </div>

                <!-- CONTATOS DE REFERÊNCIA -->
                <div class="secao-form">
                    <h3>📞 3 Contatos de Referência</h3>
                    <input id="ref1" type="text" placeholder="1º Parente/Contato (Nome e Tel)">
                    <input id="ref2" type="text" placeholder="2º Parente/Contato (Nome e Tel)">
                    <input id="ref3" type="text" placeholder="3º Parente/Contato (Nome e Tel)">
                </div>

                <!-- DOCUMENTAÇÃO / GARANTIAS -->
                <div class="secao-form">
                    <h3>📁 Documentos e Comprovantes</h3>
                    
                    <label for="docFrenteVerso">Foto do Documento (RG/CNH - Frente/Verso):</label>
                    <input type="file" id="docFrenteVerso" accept="image/*">

                    <label for="fotoResidencia">Comprovante / Foto da Residência:</label>
                    <input type="file" id="fotoResidencia" accept="image/*">

                    <label for="printGanhos">Print de Ganhos / Perfil do App:</label>
                    <input type="file" id="printGanhos" accept="image/*">
                </div>

                <button onclick="salvarCliente()">Cadastrar Empréstimo</button>
            </div>
        </section>

        <!-- DETALHES DO CLIENTE -->
        <section id="detalhesCliente" class="tela">
            <div id="detalhes"></div>
        </section>
    </main>

    <!-- MODAL DE VISUALIZAÇÃO DE IMAGEM EM TELA CHEIA -->
    <div id="modalImagem" class="modal-imagem" onclick="fecharModalImagem()">
        <span class="fechar-modal">&times;</span>
        <img id="imgModalExpandida" src="" alt="Imagem Expandida">
    </div>

    <!-- NAVEGAÇÃO INFERIOR -->
    <nav>
        <button onclick="abrirTela('dashboard')">🏠</button>
        <button onclick="abrirTela('clientes')">👥</button>
        <button onclick="abrirTela('novoCliente')">➕</button>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
